name = "blackimg-online"
main = "worker.js"
compatibility_date = "2026-07-05"
workers_dev = true
routes = [
  { pattern = "blackimg.online/*", zone_name = "blackimg.online" },
  { pattern = "www.blackimg.online/*", zone_name = "blackimg.online" }
]

[vars]
APP_ORIGIN = "https://blackimg.online"
CANONICAL_HOST = "blackimg.online"
PAYPAL_ENV = "live"
THOUSANDENGINE_BASE_URL = "https://thousandengine.com/v1"
THOUSANDENGINE_IMAGE_EDIT_ENDPOINT = "https://thousandengine.com/v1/images/edits"
THOUSANDENGINE_IMAGE_MODEL = "gpt-image-2"

[assets]
directory = "public"
binding = "SITE_ASSETS"
not_found_handling = "none"
run_worker_first = [
  "/*"
]
